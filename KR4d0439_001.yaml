自波晚節黃花秋思淡夕陽紅樹客愁多何時歸鶴招丁令有意逃漁侣志和不管白頭烏帽落西風一曲付狂歌寄郭樞山起敬英聲亦有年酒邊曾見錦囊篇吟情六義初刪後古意三爻未畫前放曠嗣宗應絶俗清狂太白不妨仙如今海內無工部誰肯題詩寄鄭䖍燈花發生元不假栽培一㸃春從午夜回自喜結根依小草不愁飛片㸃蒼苔熒熒有豔蛾頻撲淡淡無香蝶不猜窗下敲棋紅燼落更深約客未曾來樂道門掩荒苔客到稀閒情已與世相違胸中宇宙自然景眼底江山不盡詩雲淡風輕皆道體鳶飛魚躍總天機吾心與物同真樂此處寧容俗子知次毛一齊韻詩夢驚殘何處棋書窗又是夕陽時柳隂分緑籠琴几花片飛紅㸃研池覽鏡自憐添白髮傳杯不復倩蛾眉東風故國年年恨唯有啼春杜宇知寄月山少監一片襟懷海樣寬眉頭肯為别離攢臂鷹慣識從君樂汗馬寧辭行路難角帶邊聲關月冷雁傳鄉信塞雲寒歸來未許東山卧見說蒼生望謝安送文正公遺像與王東廬古畫來從寶繪堂遺君敢惜舊珍藏貌存故國三公貴澤衍來孫百世芳家廟幾年成闕典宗支此日倍增光當時種德根苗逺分得槐隂到鶴鄉逰西湖次毛玉田韻觸目錢塘昨夢非行春載酒憶當時花間不碾香輪入柳外空鞭駿馬飛落日荒山和靖墓斷雲流水子胥祠忘情鷗鷺閒干我應笑江湖盡未歸故國有懷呈任子宏提舉十年不作還家夢荒草深深鎖竹扉無主落花隨水去有情啼鳥勸人歸儒冠寥落風流减客路凄凉故舊稀何日攜琴賦歸去踏雲自採故山薇寒夜即事倚遍闌干更漏長柔髭撚斷為詩忙清分梅影夜宜月寒入雁聲天正霜懷古頓添孤客恨追歡難學少年狂讀書窗下篝燈坐一卷離騷一篆香謝章平惠筆管城二子樣尖新分惠山房勝與金淮兔扳毛誇匠巧魯魚正字見功深抄書未得纎毫力握管難忘一寸心揮翰玉堂無夢到雅宜茅屋寫清吟龍江館舍幽棲俗事不相關家在青松翠竹間繞屋四圍都是水隔林一片不多山詩篇陶寫清秋景書冊消磨白日間門外沙鷗如舊識忘機飛去又飛還元日睡眼朦朧撐不開雞聲唱曉夢驚回竹爐尚有殘冬火柏酒初斟新歲杯身世百年如夢幻功名兩事巳心灰門無賀客清閒甚自汲寒泉灌古梅俞景仁教諭相過江雲舒卷弄隂晴新緑園林似染成花怯曉風寒蝶夢柳愁春雨濕鶯聲栖遲茅屋無塵事深閉柴門逺俗情佳客相過慰岑寂酒邊閒把近詩評修竹有樓名與造化游對秦望山五雲門秦望諸山隱几看仙居縹眇五雲端天髙地迥三千界月白風清十二闌滄海氣浸珠珮濕明河影逼玉簫寒超然身在鴻濛上何必蓬萊跨紫鸞修竹宴客廣寒逰亭分韻得香字銀橋疑駕海天長金粟離離照玉觴影浸山河瓊殿冷舞分風露羽衣香亦知廣莫元無野却笑溫柔别有鄉閒折一枝驚昨夢素娥憐我授𤣥霜酒邊呈張景純能畫山水蓬萊閣上笑談餘别後思君看畫圗萍水相逢俱老矣家山自好盍歸乎清風一榻莊周蝶明月扁舟范蠡湖此是達人真樂事客中何必歎窮途江上客懷鏡裏從渠白髮添吟邊抵掌復掀髯十年為客甘清苦一枕忘情付黑甜短褐怯風綿未絮破窗漏月紙重粘梅花應念人孤寂寒夜吹香入竹簾夜坐香篆烟鎖夜氣清篝燈開卷遣閒情半窗月落梅無影三徑風來竹有聲樂道何須圗富貴讀書元不為功名白雲滿榻便髙卧欹枕詩成夢不成挽衛山齊楹夢驚殘忽告終儒林多士失宗工雲間便覺無清氣江上誰能繼古風蕙帳夜闌孤鶴怨茆齊人去九山空我來豈為私情哭哭痛君亡吾道窮武公後裔有仍孫德望才名世所尊擬向山中專注易忽傳地下趣修文月樓不復賡詩句春閣猶思共酒樽痛恨死生千古隔西風吹淚濕秋雲送任子敏司丞赴北鞭影拖雲入帝京少年正好作功名不辭驛騎三千里欲奮鵬摶九萬程白玉堂中揮翰墨黃金臺上被恩榮何須折柳送行色只寫詩篇話别情和俞教授見寄韻天邊日月似梭飛百歲光隂難預期有酒不妨留野客無錢何惜典春衣江山猶記登臨處身世都非少壯時晚景清言宜學道黃庭一卷究𤣥微任後齊池上有瑞蓮命豫賦之芙蕖開處傍池亭花結雙頭媚晚晴兩隗駢肩如欲語二喬並首似含情同心净植真竒種聨蒂騰芳以瑞名若使濓溪當日見愛蓮有說恐難評鹽同絺入貢載遺經分賜羣臣羡水晶潤下作鹹從海産熬波出素似天成享神潔白惟形似富貴珍竒以寶名此物可方為相事他時商鼎用調羮瓶笙熱中竟日自煎烹音調都從一氣生緩緩煮湯才蟹眼微微聒耳忽蠅聲頻驚清夢愁無寐似訴羈情歎不平却笑書生那解此聨詩石鼎羡彌明書懷杜門已與俗相違苔徑荒凉轍迹稀自愛清凉忘世慮肯求富貴役心機隱居盤谷勝金谷耐著麻衣鄙錦衣百歲光隂皆夢境且看走兔與烏飛和杜柳溪韻安貧樂道豈卑微肯羡黃金帶十圍爵到三公今却有齒踰七袠古來稀滿頭霜雪客懷老過眼煙雲人事非皎皎白駒在空谷好賢誰復詠緇衣布金潤玉隱廢寺閒居梵剎當年聚衆僧叢林深處著禪扄金沙布地階無土玉軸堆函藏有經雲樹千尋張翠蓋烟蘿一片展青屏星移物換今寥落古寺猶存柏子庭和葺廬韻地僻渾無車馬喧禪房修飾稱居安莊嚴固是由心造丹艧多應被眼瞞佛法不須身外覔世緣只作夢中看我來欲問無生話萬頃西江一吸乾偶成簡任肅齊教諭百年光景易侵尋消遣閒愁只苦吟但覺筆頭風雨濕不知鬢底雪霜侵冥鴻已負九霄志老驥空懷千里心富貴倘來應有命何須彈鋏扣知音百歲光隂一轉蓬晚年不與少年同事因錯處人方省詩到窮時句始工獻賦未逢楊得意憐才難遇杜司空有時追憶承平事猶道繁華是夢中貧病交攻久廢詩蕭然一室獨棲遲酒錢巳盡琴將典瓶粟無儲鶴亦飢豪傑不多陳仲舉結交惟缺魏無知簞瓢鐘鼎都休計畢竟窮通各有時奉謝月山太守太守相過慶誕辰貴能下賤見公心行厨鼎列雙魚美衆客咸瞻五馬臨曲唱駱駝誇白雪杯傳鸚鵡擁青襟寵頒束帛尤增感恩與滄溟一樣深夜坐即事霜氣侵窗冷客氊青鐙白髮老堪憐光隂明日又明日世事一年難一年眼底江山元似舊胸中風月本無邊道人不作陽臺夢紙帳梅花伴獨眠和茅亦山先生雜詠風柳吹花糝白氈鶯愁蝶恨有誰憐不知春事又三月堪笑人生無百年清氣長留詩卷裡閒愁不到酒樽邊山窗晝永渾無事一榻分雲枕易眠身世飄浮水上蓬閒中清事有誰同吟窗夢草添詩料畫筆生花奪化工酒後烏烏時擊缶愁來咄咄自書空園林寂寞春何處春在桑麻雨露中破硯塵封懶賦詩晚年才思覺衰遲耽書自笑已成癖煮字元來不療飢風月滿懷詩可寫雪霜侵鬢鏡先知太公八十方榮遇把釣溪邊更待時端午月山主人酒邊即事窗外葵榴照眼明香蒲沁酒注銀瓶自無量飲堪同醉非慕清名效獨醒一日沈湘悲楚客千年弔古讀騷經他鄉記節聊隨俗艾虎硃符挂戶庭時序催人易白頭端陽懷古客添愁硃符不寫湘纍恨角黍難包楚國羞記節何妨斟蟻酒奪標無復見龍舟髙歌思逺樓前路掩雨珠簾今在不寄謝蔡松江路教一别丰標又一旬尺書多荷寄殷勤交游滿眼誰知巳契濶關心獨憶君蕙帳夢寒同夜月松江人逺隔秋雲明朝便買扁舟去來訪貞陽舊廣文和杜柳溪韻白髮垂垂一老夫年來漸覺世情疏石牀夢冷和雲卧茆屋燈殘共月居客至何妨賖魯酒家貧不肯典唐書羡君種柳清溪上借我苔磯學釣魚和茅亦山秋感懷老來吟拙自知羞好景無詩未易酬湖海愁看今夜月功名虛度十年秋清光偏照盧同屋孤影自登王粲樓我欲乘風蟾窟去安能與世共沈浮茅亦山相過故人過我竹邊居談笑從容樂有餘洗盞共嘗春甕酒挑鐙對讀夜窗書歸來尚憶淵明菊髙卧誰知諸葛廬醉後達觀今古事寥寥千載只須臾上亷訪分司官行部巡荒察吏奸皇皇使節古刑官聲搖天上星辰動清過雲間風露寒肅政嚴持三尺法恤民特放十分寬香名巳覆金甌底便作他年宰相看和鄭樞山竹夫人韻玉環傾國起安兵有色終汚後世名九夏專房何在貌一身空洞若為情寵名本自無心得婦節從來徹骨清愁見媫妤秋後扇共懷幽恨幾時平斑竹夫人汗清書墨沁微凉李衛曾攜近竹牀眼孔盈盈看熱客泪痕㸃㸃泣秋房湘紋冷淡宜湘簟玉體玲瓏稱玉郎秦虢疏封無夢到傍人空以睡為鄉逰虎丘山寺浮生偷得片時閒古寺尋僧借景看樓閣倚雲山氣濕轆轤捲水澗聲寒地埋吳劍痕猶在碑刻唐詩字未漫寄榻禪房不知曉起來松日已三竿賈秋壑圃不學蒼龍卧浙東驚風吟珮墮青璁既無長䇿安江左空有名園似洛中危棧連雲晴亦雨飛樓近海夜生風人間富貴皆塵土回首吳山落照紅聞鶴寒蟾初上海雲收何處仙禽過庾樓清夜照人千里月碧霄警露一天秋玉笙縹眇緱山去羽袂蹁蹮赤壁游回首女牆舊時事千年華表動新愁和毛宣慰蓬萊閣韻傑閣翬飛翠靄間蓬萊元不在人寰緑圍城廓千村水青遍簾櫳四面山華表鶴歸遼海逺髙臺鳯去夕陽間我來倚遍闌干月雲鎖重門夜不關送張按察移節江陵滿載琴書事宦游皇皇使節重咨諏蒲帆風飽三千里繡斧霜寒十六州荆渚行觀新德政越人共憶舊風流市橋衰柳難攀折只拗梅花送去舟次鄭朴國正見寄雲深紅日出林遲晞髮簷前力未衰老愛歸田追靖節狂思入海訪安期春風巷陌梅花後故國江山杜宇時一種閒愁無著處倚窗重讀寄來詩漁舍觀梅寄修竹韻寒雲漢漠護牆隂瀟灑梅枝出竹林影落荒磯和雪釣香浮老瓦帶春斟幾憑水驛傳芳信秖許沙鷗識素心回首孤山千樹逺扁舟乘興夢中尋贈大禪寺昉上人佛屋參差傍水涯天然富貴屬僧家油幢碧立當軒竹步障紅圍繞檻花隱隱磬聲春晝永停停塔影夕陽斜白頭道者留連客自汲山泉煮石茶贈通𤣥觀唐道士竹鄉通𤣥道士苦修行坐見桑田幾變更雲屋苔封燒藥竈風林花落煮茶鐺休糧賸有青松啖卻老應無白髮生月滿竹鄉騎鶴去欲邀子晉學吹笙夜宴醉月飛觴興未闌蓬壺影裡漏聲殘碧浮金鼎香脂暖紅閃銀臺燭淚乾豔曲喜聽催拍近狂歌自覺入腔難賞心樂事輸年少一㸃閒愁了不干隱居編茆卜隱讀書林門掩蒼苔一徑深當户曉山長識面臨窗夜月獨知心花圍錦繡翻紅影竹列琅玕舞翠隂别是一般清富貴何須滿塢積黃金見梅孤根偷轉一分陽枝北枝南次第芳照水曉妝氷鏡冷橫空雪樹凍雲香未成林實調金鼎先占春魁伴玉堂因憶西湖林處士年年覔句為伊忙挽任宅雲方擬榮除上玉堂玉樓有召返仙鄉才過賈誼同年少齒長顔回一歲亡師友交情從此絶死生異路實堪傷雲邊宅在人何在腸斷西風淚幾行寄王愛梅塔下開館諸生歸去暮庭空塔下遊觀倚瘦笻千尺寶輪擎海月七層金鐸話天風升堂儘可同僧飯持鉢何須聽寺鐘好把新詩題舊壁他年應有碧紗籠送人歸洛白眉公子氣昻昻年少多才姓氏香腹飽儒書宗孔孟心傳醫學祖岐黃秋亭聽鶴游吳㑹春館看花憶洛陽老我自憐身是客江湖又送客還鄉上李承㫖學士三首儒林學海老宗師每恨聞名識面遲一部山川司馬記百篇風月謫仙詩玉堂揮翰思當日金鼎調元定此時抱負大才應大用行看事業邁周伊表表聲名動縉紳金鑾奏事舊詞臣胸中千古淵源學天下十分端正人猶記演綸依日月行看聽履上星辰枝南枝北雲山異何日摳衣拜後塵中朝人物總稱賢恬退閒居又幾年獨抱丹心長戀闕因思緑野且歸田未應雋軓淹東魯行看文星照北燕見說君王思國老鶴書即下九重天寄月山少監南北相望各一天江湖久别思凄然迢遙道路三千里倐忽光隂五六年清節立朝君可