無邊黃菊壓叢秋色萬黃英多少金風染得成籬下年來無靖節寒香不似晉時清螢火化形腐草暗生光數㸃隨風過野塘窗下久無人夜讀此身不入照書囊睡起滿階竹影掃斜陽一枕秋風桂子香夢裏不知身是客覺來依舊在他鄉寄秋山和尚幾夜孤吟憶貫休疏鐘敲月動詩愁何人來入匡廬社分我山中一半秋懷友聽雨思君淚欲流簷聲滴老鬢邊秋何時過我晴窗下共話思君聽雨愁昭瑞宫月夜飛仙挾我上瑤壇古桂香中夜倚䦨鐵笛一聲吹月落滿身風露不知寒東山謝太傅祠薔薇亭圍棋别墅卻秦軍千載功名一窖塵今日江山非晉有荒祠花木為誰春夢情為懶菴上人賦柏子煙鎖懶坐禪白雲半榻伴髙眠分明記得莊周蝶飛向梅花雪澗邊田家流水小橋江路景疏籬矮屋野人家田園空濶無桃李一段春光屬菜花春寒客思重重山色外詩愁㸃㸃雨聲中著人料峭東風急牆角桃花未肯紅春寒料峭透窗紗睡起晴蜂恰報衙怪得曉來風力徑滿階香雪落梨花池荷紅藕花多映碧欄秋風才起易雕殘池塘一段榮枯事都被沙鷗冷眼看聽琴一曲猗蘭按玉徽髙山流水少人知紛紛耳聽非心聽安得人間有子期蓬山堂訪王鶴隱髙士不值蓬萊深處訪仙家雲護巖扉石徑斜笙鶴未歸春寂寂青鸞啄碎碧桃花過曹娥廟細雨兩山眉黛斂怒濤千古哭聲寒須知此廟關風教莫作尋常神女看禹廟行春大禹祠前柳色新駢闐車馬鬬行春登臨都道江山好話到平成能幾人子胥廟伍相祠前雲氣昏奔吳心事與誰論怒濤夜半翻江月疑是忠臣一片魂西湖行春畫船無復沸笙歌湖水年年自碧波回首蘇公堤上柳緑隂不是舊時多明妃和戎何惜遣蛾眉悔悟徒然殺畫師漢主深恩如可報妾身雖死亦無辭一函香骨埋沙漠魂魄多應繞漢庭惟有春風知此恨年年吹拂草痕青煬帝行宫彩鳯樓前汴水流君王不復錦帆逰長堤舊日青青柳曾帶春風拂御舟明皇按樂圗一曲霓裳舞太真誰知鼙鼓動邊塵當時若按周姬樂治世音中無亂人采蓮女越女蘭舟泛緑漪采蓮花露濕紅衣萬荷影裏歌聲過驚起鴛鴦貼水飛通𤣥觀雲氣深深護石壇紅塵飛不到䦨干清隂滿地無人跡一徑松風鶴夢寒林髙士隱居家住西湖深更深古松隂裏禮茅君白猿攀樹藤花落㸃破巖前一地雲吟邊落盡荼蘼燕未歸小園寂寂掩柴扉吟邊正苦無詩料風遞楊花撲客衣道士夜醮步虛聲裏碧雲飛珮玉珊珊謁紫微月浸㓻風鸞鶴過仙都道士拜章歸題梅花詩卷後月香水影句清竒除却逋仙更有誰吟骨春風吹不落此翁已後絶無詩贈王琴所一曲絲桐餘古意百篇風月寄閒情君詩即是琴中􅋵底用離鸞别鶴聲謝聰講師惠桂花廣寒世界仙家種金粟如來佛國花多謝髙人分惠我一枝和月到山家客懷年年春暮客天涯愁見東風揚柳花自嘆身如梁上燕營巢長傍别人家春夜銀燭燒殘聽漏聲春寒詩思覺凄清一庭夜色無人管分付梨花伴月明枕邊瓶桂巖桂花開風露天一枝折向枕屏邊清香重透詩人骨半榻眠秋夢亦仙問菊山園獨立對秋光一袖西風兩屐霜笑倚東籬問寒菊自淵明後幾畨香半軒疏雨簷前數㸃弄晴光浥露庭花枕簟香池草夢回詩思杳吟窗分得一邊凉蝶隨風粉翅太輕狂夜宿花房春夢香栩栩不知身是夢又將魂夢化䝉莊見雁有懷滿眼西風憶故廬親朋音問久相疏年年江上無情雁只帶秋來不帶書聰講師涅槃臺莫將生死視如來要看蓮花火裏開勘到灰飛煙滅處涅槃不是涅槃臺贈談命姚月壺胸中消息千年厯舌底窮通一世人試把五行推測看廣文官冷幾時春中秋對月十分蟾影照人間一片山河古影寒惆悵年年今夜月人生能得幾回看秋意梧葉翻風敲老樹蛩聲帶月泣寒莎只消些少閒風月便覺客窗秋意多對菊春花能得幾時紅萬樹繁華轉眼空黃菊雖黃偏耐久西風雅淡似東風玉繡毬花花神巧學傳官樣不屬針工屬化工疑是瓊瑤初琢就一團香雪滚春風即事春晴無處不繁華多少逰人逐鈿車盡道東風花柳好誰知生意在桑麻九日感懷新橙初試蟹螯肥一曲清歌酒一巵料得故園秋正好黃花應怪客歸遲黃蜀葵畫卷蜀質何人為寫生金杯翠袖捧朝陽花前露重宫題濕猶帶南薰殿裏香春夢銅匜艾納翠氤氲六六屏山酒半醺夢入中州看秦畫春風吹亂玉梨雲題明皇按樂圗五鳯樓前沸管絃春宵花暖月娟娟纎腰舞到霓裳曲驚起猪龍地上眠明皇楊妃圖君王擁袖倚嬌容指法相同曲亦同料想馬嵬千古恨當年巳寓笛聲中暮景浮雲開合晚風輕白鳥飛邊落照明一曲彩虹橫畍斷南山雷雨北山晴和靖墓木落孤山墓草荒梅花千古帶詩香吟魂仙去誰招得獨鶴一聲幽恨長宫詞聞說君王御宴回宫人留鑰內門開琵琶撥盡黃昏月不見花間鳯輦來臨平泊舟客舟繫纜柳隂傍湖影侵蓬夜氣凉萬頃波光搖月碎一天風露藕花香錢府舊園十二峰前富貴家亂離不復舊繁華亭臺寂寂無人到流水東風自落花春雨詞簷聲滴碎玉䦨干開盡梨花亦懶看燕子不歸人寂寞深深宫殿鎖春寒山中萬壑松聲撼翠微夜寒風露濕人衣山翁踏月巡幽徑竹裏籠開鶴未歸客路春風客路草萋萋小駐征鞍日又西回首山前雲樹暗竹雞聲裏鷓鴣啼金陵懷古六宫禾黍千年恨一片江山萬古情明月不關興廢事夜深還照石頭城仙姑對奕圗碧玉花冠素錦裳對拈棋子費思量經年不下神仙著想是蓬萊日月長山村小小荆扉傍水開竹橋分路入蒼苔呼童掃去階前葉怕有詩人踏月來虎丘阻雨石闌浸碧澗池空池外秋聲萬壑風人倚僧窗看風雨亭亭塔影有無中山中秋夜石牀彈月鶴聽琴玉宇凝秋絶㸃塵萬里無雲銀漢淡一天風露濕星辰寄别方蘭室醉下山樓客袂分杖藜猶帶碧䦨雲歸來紙帳眠清夜半夢梅花半夢君水仙花氷魂月魄水精神翠袂凌波濕楚雲雪後清閒誰是侣汨羅江上伴湘君春閨屏山夢斷整雲鬟金鴨吹香火未殘背倚䦨干聽燕語一簾風雨捲春寒槿菊槿菊叢叢繞水涯深紅淺紫映山家平生不識春風面籬落秋深各自花孔明髙卧圗未用胸中八陳兵草廬髙卧掩柴扄當時不見劉𤣥德誰識先生是將星蓮花亭避暑日火燒空海欲乾蓮宫深處晝生寒佛家一片清凉景借與詩人盡日看贈易數周仁山河洛圖書非紙上乾坤爻象只胸中煩君細算乘除數吾道何時可變通龍江無杜鵑客裏春殘又一年落花滿地草連天緣何不動歸歟興秖為龍江無杜鵑道院即事月到松庭鶴未眠𤣥都羽士誦靈篇玉爐煙斷瑤壇冷金磬一聲霜滿天暮春園林芳事已䦨珊開盡荼䕷亦懶看深院日長眠聽雨重重簾影隔春寒傷春東皇别我太匆匆急景相催鬢已翁杜宇一聲花結局人生消得幾春風即景籬落西風野老家閒看景物感年華柳衰荷敗芙蓉死交割秋光與菊花贈上人懶聽人是與人非有耳如聾未是癡不采當時臨濟喝威王前事已先知墨蘭一幅幽花倚客窗離騷讀罷意凄凉筆頭喚醒靈均夢猶憶當時楚畹香寄任子忠老去懷人鬢已秋江山猶帶别時愁碧雲不隔相思夢幾度吟魂到客舟和李藍溪梅花韻孤山别後有誰憐踏雪看花又一年幾度相思空夜月角聲吹恨不成眠覔句逋仙琢肺肝聲名千古冠吟壇一詩香盡西湖水白雪陽春和者難一枝寒玉倚橫塘和雪攀來袖亦香插向膽瓶籠紙帳長教夢繞月昏黃南枝開編此枝開秖恐飛香落砌苔踏雪詩人應癖好杖藜日日為詩來折柳陽關一曲灞橋春垂緑隂中别恨新漫折青絲千萬縷多應絆不住行人畫笋錦籜斑斑帶露痕毫端寫出此君孫清髙不肯埋塵土根本雖無有節存秋吟蘆花零落㸃汀洲白鷺飛邊泊小舟水落漁磯風露曉殘荷數㸃冷擎秋曉徑支笻步屧遲西風吹露濕秋衣舉頭凝望青山外萬里江天一雁飛秋髙風急雁來初久客松江豈為鱸好夢不成人睡覺半窗殘月夜燈孤淪落天涯已白頭西風吹帽冷颼颼悲秋未了悲身世一樣情懷兩樣愁略彴當門石徑斜槿籬深護野人家炊烟起處江村晚一片斜陽萬㸃鴉滿眼秋光動客情小園閒步杕藜輕黃花憔悴應思晉才遇淵明香便清王荆公廟遺像巋然占古祠區區土偶亦冠緌無言似想青苗䇿面目猶如執拗時項羽臺失計鴻門恨未消一身霸業亦徒勞當時謾築臺千尺爭似欹風地步髙柳腰舞東風未肯休西風吹葉翠眉愁誰知此是多情樹最愛春光最怕秋梁燕梁間兩處燕成窠來往銜泥帶落花眤眤並頭休巧語相依總在别人家梅花竹邊籬外樹封苔兩蕊三花帶雪開蜂蝶只貪桃杏豔嫌花冷淡不飛來酒家風颭青帘掛杏村田家新釀甕頭春今年米貴無錢糴買醉銜杯能幾人江村極目江天一望賖寒烟漠漠日西斜十分秋色無人管半屬蘆花半蓼花西山韓太師墳古墓年深草樹荒石人石馬卧斜陽爭如湖上逋仙冢詩骨埋雲萬古香牀屏墨竹淇澳新梢筆下分枕屏墨暈㸃寒雲詩人紙帳眠清夜不夢梅花夢此君和靖墓西湖卜隱為詩忙吟到梅花字字香鶴不歸來山寂寂梅邊閒詠月昏黃述懷故鄉迢遞幾時還目斷長江杳渺間一雁天邊飛萬里白雲多處是青山寓舍古木無葉桃李門牆萬柳青詩人茆屋獨凄清簷前古木無春葉可怪東風亦世情秋信豆雨初晴浣溽埃報凉梧葉墮階苔一聲新雁南樓外早送西風信息來秋色虹影界開微慘淡雁痕㸃破更凄清一畨雨過天容碧盡是西風染得成秋聲庭外梧桐葉葉風樓頭過雁砌邊蛩隔窗砧杵敲殘月喚起鄉愁歸興濃秋隂漠漠寒烟暗蓼汀江涵雁影不分明一天暝色迷清晝雲閣西風雨未成秋霽雨過郊墟凉意新癡雲駁盡十分晴隔江一抹斜陽影怪向蓼花紅處明秋音心庭前梧葉雨晴後江上荻花風起時凉繞書窗人未覺葛衣竹簟已先知閨情效香奩體金鴨煙消一字香滿懷春恨强梳妝看花又怕東風惡偷隔紗窗看海棠淚浣香腮粉未乾相思成病怯春寒此情欲向琵琶訴整得琵琶又倦彈黛眉愁裏斂雙蛾别久無書爭奈何欲待怨他還又憶怨時較少憶時多懶向妝臺對鏡鸞羅衣怯薄正春寒黃金絡索珊瑚墜獨立春風看牡丹江村即事江村暝色漸凄迷數㸃殘鴉雜雁飛雁宿蘆花鴉宿樹各分一半夕陽歸春日紫燕評春語畫梁黃鸝攙曉囀垂楊博山煙冷書窗靜風颭瓶花㸃硯香舟次九山水雲盡處列竒峰螺髻參差杳靄中江岸維舟看不了烟嵐分碧入疏篷讀秦紀并吞六國獨稱雄經籍灰飛烈焰中書外有書焚不盡一編圯上漢成功修竹館舍乳燕銜泥春晝長枕書無夢到髙唐桃花紅雨梨花雪相逐東風過粉牆夏日陪王君玉泛舟鑑湖波光萬頃接天光畫舫歸來載夕陽一棹湖心天不暑萬荷風裏滿身香秋夜登西樓清逼金英玉露漙姮娥深夜不禁寒桂花香裏人敲句倚遍髙樓十二䦨雜咏柳嫌暮雨鶯聲澀花怯東風蝶夢寒偶憶故國春色好他鄉花柳帶愁看人非陶令空看菊詩不林逋漫咏梅晉宋後來愛花者輸他髙節與髙才天外斜陽猶在樹林間宿鳥已歸巢黃昏莫把柴門掩恐有詩人帶月敲稚柳已回春暖意殘梅猶結歲寒心百年身世詩中老好景難消幾度吟新緑園林微雨後落紅庭院夕陽時一聲杜宇催春去貪睡棠妃未必知持螯已飽團臍蟹斫膾猶思巨口鱸風物秋來多感慨天寒酒醒客心孤囊底詩成無賣處牀頭金盡已多時元龍豪氣依然在慣守清貧豈足悲人無氣節何足道腹有詩書自不同實學真才誰具眼江湖難遇杜司空地多種竹堪容鶴池不栽蓮恐礙魚小徑荒苔人不到閉門閒學換鵝書竹林夏日不受炎光玉萬竿仙林便作晉林看此君長帶氷霜氣醉卧緑隂詩夢寒滴翠松老翠蟠空一樣髙月分寒影落庭皋哦詩猛把闌干拍宿鶴驚飛露濕袍夜窗香篆煙銷夜已闌硯池氷結漏聲寒梅花影戀書窗上應待詩人帶月看補遺宿甘露寺山險疑無路縈回一徑通鐘聲寒瀑外塔影夕陽中窗出茶烟白罏分葑火紅禪房遇耆舊清話數宵同晚春老來無復事狂逰倚杖看花動客愁病骨怯寒春不管柳綿風裏木棉裘雜咏耽書自笑已成癖煮字元來不療飢風月滿懷詩可寫雪霜侵鬢鑑先知屏巖小稿
