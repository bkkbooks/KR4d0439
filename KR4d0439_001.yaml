body:
  text: 屏巖小稿元張觀光撰古風擬古五首畹中有幽蘭風露飽清抱含章不求聞坐見九秋老夫君日已逺佩飾為誰好何如斂餘芳山林養枯槁驪龍有明珠竒氣久磅礴一為鮫人采夜半泣海若至寶諒難得珍藏思逺託如何賤所貴用之以彈雀彈雀亦何惜一去恐流落名門有貞女始結絲蘿盟嬿婉席未溫良人已逺行逺行何時歸妾身不自輕空幃守寂寞誓以終此生雖云受恩淺耿耿懷至情山中怪物變草木自四時秋水照短髮血氣日以衰寒藤不知枮青青上疏籬繁隂縱有託已迫風霜期餘生方自憐孤吟欲何為徂徠有嘉木薿薿髙連天修柯濯雨露沃葉藏雲煙根蟠九地暖聲落四壁寒由來所養貴不與春相干歲久産茯苓土色腴且堅山人劚為藥至味通靈仙願言事服餌身可三千年旦景雞鳴起濯髮披衣出户牖自汲古澗泉落月猶在手三漱吞朝霞餘光散花柳兹意難語人延竚忽良久至後道人坐茅宇獨抱無絃琴對此景物異夕雲散還隂雨氣一簾潤雲意千山深新陽暢微暄疏花㸃孤林芳時坐消歇孰同歲寒心孤梅發清夜庭樹驚棲禽故相賈秋壑舊府當年構華屋權勢傾衛霍堂宇窮斧斤天氣煥丹雘花石擬平泉水陸致兹壑惟聞丞相嗔肯後天下樂朱門鎖荆榛花木巳蕭索蒼生顛墮崖國亡身孰托空悲上蔡犬不返華表鶴丈夫保勳名風采照麟閣胡為一聲鉦聚鐵鑄此錯回頭暮煙昏不能掩餘怍九日㑹王修竹西樓預坐者七人以落霞與孤鶩齊飛分韻豫得落字即席走筆冉冉五雲深山西日光薄登樓集羣賢縱目天宇廓落木悲徂年寒光照杯酌浩歌興悠然意行非澗谷緬懷龍山逰此樂久寂寞胡為落帽人白首戀賓幕醉餘發詩情分韻盡佳作吾愛漉酒巾西風吹不落緑珠娉婷石家姝榮顯晉朝使斛珠不論資得備巾櫛侍一笑金谷春粉黛皆斂避豈知步障中乃復為愁地念主愛妾深因妾為主纍樓頭風月愁殘花抱春墜燕子樓繁華隨逝水日暮髙樓空哀哀徐陵妾事主不及終空房輟膏沐明粧為誰容春風燕子來秋風燕子去去來影帶雙孤鸞抱憔悴回首醉嬌時百花不敢媚潘淑妃二八入宫掖一笑輕三千雲階渺何許步步生金蓮繡鞋不勝春風若凌波仙榮華一回首荆棘生我前君恩花上露妾心井中泉井泉誓不波下照青青天秋胡妻陌上桑葉稀家中蠶正飢妾心知採桑安知使君誰結髮為人婦幾年守空幃婦義不移天黃金欲何為老姑倚門久不待盈筐歸為妾謝使君風化關庭闈紀夢是歲大旱老年屏人事北窗寄髙眠夢魂御風去金闕開九天虎豹獰不嗔知豫有仙緣玉座擁五雲香爐飛紫煙青衣兩童子舉手導我前下土蟣虱臣愚衷欲敷宣兵戈幸休息饑饉方連綿洪惟大生德實司水旱權願言回哀眷與世解倒懸上帝允臣請乃曰賜豐年再拜謝闕下回飇墮林泉夜雷聲殷殷甘澤朝滿田沉思喜且驚異夢非偶然士懷當世憂膏澤期無愆貞觀有房杜斗米三文錢夜後謝友人顧問索居坐孤陋却掃甘隱淪荒徑無轍迹蓬藋方蓁蓁風雨撼四壁一榻寄屈伸誰念相如病豈堪原憲貧友人隔河梁懷思賦停雲柴車忽過我問勞何殷勤促膝話契濶道合情更親語言邁流俗意氣含至真興懷談不盡浣我胸中塵盤蔬與束脯草草為爾陳瓦盆煮新酒味有太古春非徒洗磊塊亦足消鬱陻北窗坐終日薄暝生秋旻斜陽戀客影把袂不忍分此去歲月邁何時復相親我輩重道義勢利何足云榮華易消歇德齒久彌新願言保名節努力配古人逰謝仙巖飛霞觀巖下李參政墓鬼工鑿山骨何年驅六丁飛霞繞石洞縹眇開珠庭永懷謝仙伯坐斷山水城我來事幽雅登臨委客情松風驅溽暑自覺毛骨清猿鶴亦仙意人生空營營石麟卧荒草問是誰家塋野老對我言其人昔公卿金玉埋黃壤送日冠蓋傾興衰異百年所重非修名乃知鐘鼎貴不如芝薇馨所以世外人返老還孩嬰倚杖空嘆息洞口雲冥冥約王琴所不來舟中偶成清颷捲炎埃碧水出秋素迢迢見山亭回首隔烟霧酒帘揚漁村笳鼓響軍戍倚篷問舟人云是三江路籬落雞欲棲野水牛已渡釣翁炊荻烟稚子收漁具抱琴人不來殘陽在髙樹種松去年種松樹未有蒿與蓬今年松漸長埋沒蓬蒿中老髯何蒼蒼嵗華不改容回視蒿與蓬零落悲秋風題三月梅花卷紛紛姚魏家顔色競嫵媚人方眩春華東皇出古意素花飭鼎實縞袂立蒼翠猶如喧啾中孤鳯忽呈瑞巋然山林尊坐使衆芳愧讀文相吟嘯稿埀垂大厦顛一木支無力精衛悲滄海銅駝化荆棘英風傲几砧濵死猶鐵脊血灑沙場秋寒日亦為碧惟留吟嘯編千載光奕奕雲間有懷風流懷二陸才名動三吳荒冢今何許千載空煙蕪當時逞文筆萬象爭先驅有如明月璧美價傾洪都世運有翻覆韞櫝空良圖惜哉去就輕喪此千金軀人生各有死百年同須㬰獨遺文字芳乃與天壤俱凄凄九山塞冉冉谷水枯白鶴久巳寂黃犬不復呼斯人今巳矣弔古空嗟吁偶書百歲集孤夜山樓起呼月秋蟲聲轉悲感此衆芳歇人身非金石青鬢忽已雪逾淮橘心秋出山泉水汨猗蘭抱香死不受蓁莽沒鳯德嗟已衰宣尼欲浮海賴有載道經神功補元宰刪詩挽風變繫易憂世駭春秋筆削嚴西秦書乃采微義將繼周逆悲大運改悠悠千古心後死文書在古意庭前有髙樹風撓無停枝寒烏噤不鳴夜半環樹飛託身未得所三匝情依依髙飛犯霜露低飛觸茆茨乾坤豈不容振羽將安之徘徊戀明月顧影徒傷悲感懷入山採芝薇豺虎據我丘入海尋蓬萊鯨鯢掀我舟山海俱有礙瞻望凝逺愁乾坤如許大此身常浮漚依託豈無地皇皇將安求何當跨鳯鵬相從安期逰白酒歌為巖翁賦火雲燒空日色烈暑氣著人方鬱結巖翁宴客水亭東竹色蕖香獻清絶瓜削水晶蓮剖珠象箸犀盤盛陳列銀罌捧出白醖醅透鼻香濃風味别傳來未到心已寒灧灧瓊光瑩而潔初疑炎帝行冬令壺結氷澌洗袢熱又疑仙掌流沆瀣破甕傾來和玉屑誰向藍田拾瑶英釀成竒液色澄徹恐是太華井中溢修綆銅瓶汲不竭又恐夜半雷破山石髓分流乳泉裂既非西貉綿羊酥又非緱山仙鶴血胡為照眼光陸離藥玉盤中色難别令人敢咽不敢潄怕有飛霜寒齒頰一杯一杯復一杯肺腑盡化為氷雪憶昔曾誦坡仙詩白酒無聲㵼油滑開編自覺饞泉流詎謂今朝得親啜主人醖藉如此酒氣味清醇韻芳冽糟闕六經抱負特施設君王作醴思用賢應向商巖求麯蘖侍郎亭東鄰花圃栽雙松一朝煨燼枝葉空侍郎亭前有雙松至今古色摩蒼穹此木受命本千載扶持若有神始終天留真質表文獻柯葉蕃茂根本豐百年培植飽雨露虬枝風撼鳴笙鏞掀髯相視雪貿貿擁蓋對立雲童童不知天地有黃落𤣥冥失柄春無功雲孫峩冠立亭下典刑如侍乾淳翁昻藏自是廊廟具夭矯亦有山林風稜稜鐵面不可犯麾去秦爵如飛蓬諸孫奉酒立松下森森頭角皆虬龍題東山玩月圖斜陽紅盡暮雲碧一片天景涵水色海濤擁出爛銀盤千里嬋娟共今夕主人領客登東山踏碎寒光看秋液星河倒影浸空明露華漙玉夜氣清馮夷激水水欲立海若辟易天吳驚孤舟捲帆泊煙嶼古木撼壑生秋聲憑髙人在金鼇背閒看潮生煙渚外老龍翻海雲氣寒長鯨捲雪浪花碎茫茫萬頃滄浪中屹立孤峰鎖蒼翠山顛掃石羅樽罍賔主傳杯不放杯騷客掀髯賦詩去山童踏月攜琴來劇談浩飲不知醉仰天大笑歡顔開倒著接䍦欲起舞乾坤清氣入肺腑天邊風月空四時眼底江山自千古謝安躡屐逰東山袁宏登舟宴牛渚庾亮南樓今在否坡仙赤壁知何許滿眼往事轉頭空千年人物俱塵土人生光景若湍流霜痕易㸃雙鬢秋胸中勿著塵俗事眉間休鎖名利愁我輩適意在行樂古人所以秉燭逰月山追憶舊逰處盡寫風烟入縑素我來見畫如見景想像髙唐猶可賦諸君後㑹應可期雲萍合散今何之安得扁舟澉川去日與杖履相追隨登山把酒對明月共看此畫歌此詩醉時歌茫茫古堪輿何日分九州封域如許大僅能著我胸中愁澆愁須是如澠酒麴波釀盡銀河流貯以倒海千頃黃金罍酌以傾江萬斛玻瓈舟天為青羅幕月為白玉鈎月邊天孫織雲錦製成五色䝉茸裘披裘把酒踏月窟長揖北斗相勸酬一飲一干石一醉三千秋髙卧五城十二樓剛風冽冽吹酒醒起來披髮騎赤虬大呼洪崖拉浮丘飛上崑崙山頂頭下視塵寰一培塿揮斤八極逍遙逰律詩漁隱為周仲明賦一笠戴春雨扁舟寄此情世間塵網密江上釣絲輕不羡魚蝦利唯尋鷗鷺盟狂奴臺下水猶作漢時清九日偶書水國雁已到山籬菊未開判吹頭上帽莫放手中杯暮雨滕王閣西風項羽臺人生能幾屐惟恨付蒼苔秋晚山行鏗然短䇿聲無事覺身輕落葉山行軟流泉澗飲清蟹痕沙露濕雁影夕陽明歸路逢林叟班荆㰱隱盟夜坐即事對景坐清夜蕭然鬢已華詩慳難就稿燈暗不成花易醉愁邊酒頻歸夢裡家何時鋤舊圃學種卲平瓜禹廟送春歌鼓滿湖濵傾城出送春波光明畫艇山色醉逰人書穴靈何在梅梁迹已陳我來閒弔古回首一霑巾晚窗即事一枕紗窗下池塘草夢安炷雲金鴨暖滴露玉蜍寒晉帖從頭寫唐詩著眼看晚來吟思倦和月憑闌干幽居幽居少塵事贏得一身閒竹屋無人到柴門盡日關斜陽明晚浦落日瘦秋山隔水雙飛鷺忘機自往還宿龍瑞山房次周雲隱韻木葉秋容瘦客懷思故園淡雲微見月一去忽經年莎草平詩屋江潮沒釣船何時歸舊隱風雨對床眠翠峰庵即事竟日尋幽處杖藜不憚遙客行黃葉路僧立碧溪橋巖瀑飛寒雪松風吼夜潮是山皆可隱何用楚詞招王修竹館舍即事池館翠深處寬閒稱客居未仙猶閬苑不夢亦華胥竹净堪居鶴荷香欲醉魚心清無箇事長日一編書寄雲谷王府判曾記還家日重來約夏初自從一别後又是十年餘原憲非關病嵇康懶寄書無從問消息近况果何如餞越守旌斾漲天飛江山慘夕暉傾城餞州牧别淚㸃朝衣人指生祠說春隨祖帳歸自來言越瘠公去轉能肥别山隂諸友好風殘臘盡春意動園林柳色獨青眼梅花同素心江湖方轉縱歲月自侵尋忍別山隂去徘徊憶舊吟贈葛秋嚴時寓能仁蘭若蘭若分清隱秋窗飽看山風霜雙鬢老天地一身閒拄杖穿雲去吟囊貯月還詩成誰與語時訪竹林間書懷平生湖海氣老去歎飄蓬知命難求富安貧不送窮江空思捉月天濶欲行風俗眼從渠白無人識此翁寄菊坡吳府判客懷原自惡非是為秋悲一别又三載百年能幾時音書無雁寄心事有鷗知遙想菊坡菊西風香滿籬夜坐即事呈修竹一室冷于氷秋髙夜氣清月窗參燭影風葉亂琴聲寡欲知身健安貧覺纍輕吟邊閒倚竹誰識此時情晚春即事園林芳事歇風雨暗荒城轉眼青春過臨頭白髮生啼鵑亡國恨歸鶴故鄉情三徑多荒草東還許未成登寶林佛閣次韻曳杖陟髙閣登臨思渺然閒身空歲月老眼幾山川落照明秋浦飛流濕暮煙倚闌悵今昔餘恨付吟篇夜坐讀書寂寞寒窗下觀書勝苦吟青燈風雪夜黃卷聖賢心吾老關興廢斯文幾古今鳯兮胡不至三歎淚霑襟春日西園晚步為愛園林好支笻伴獨行花香能醉蝶柳色欲迷鶯但得青春在何妨白髮生斜陽紅盡處一抹暮山橫書所寓不厭茆廬小栖栖寄此身菊殘如倦客梅瘦似詩人有地堪藏拙無醫可療貧并州故鄉夢長憶鑑湖春書懷寄呈諸友寂寞茆簷下窮居更待時吾儕貧可忍餘子俗難醫風月偏宜酒江山都是詩廣文無鄭老誰與共襟期題義上人清虗閣偶來成一宿便覺與禪通看塔月影盡捲簾秋色空因知釋氏學亦有晉人風吟到忘言處悠然此意同秋夕和吕講師韻誰彈招隱操雲外伴清幽午夜山林月一花天地秋經窗凉影淡禪榻古香浮不作蟾宫夢凄然憶舊逰偶書豪氣消磨盡攜書客海濵文章難遇主天地不憐貧家纍依劉表妻兒笑買臣彼蒼還可問吾道幾時春九日茰節今朝是秋光又一年但教樽有酒休問篋無錢白髮羞唐帽黃花識晉賢龍山渺何許回首思凄然送别胡汲古自憐身是客又送客登舟雖有重來約難禁一别愁風煙迷柳驛草樹暗春洲後夜懷人處山空月滿樓西嶼即事松隂迷草徑緩步曳吟笻秋鶴有仙意寒光無冶容漁洲煙浦笛僧寺夕陽鐘回首來時路白雲深幾重春日和韻新晴天氣好老去倦尋芳桃李自春色園林又夕陽捲簾通燕入掃徑惜花香寒食清明近松楸憶故鄉述懷柴門閒掩晝雲護竹窗深茂草多生意枯松見古心有書消白日無術化黃金客問生涯事長年只苦吟對竹門對南鄰竹青青玉萬竿雖然無地種且得隔籬看露葉晴猶濕風枝夏亦寒但教休翦伐日用報平安秋色山隂詩社中選憑髙望不極望斷動愁情落日凄凉處西風㸃染成丹楓明野驛白水浸江城馬上人回首戎戎黯客程幽居結屋依山住幽窗與靜宜藤花上疏竹苔石卧荒籬挈榼童沽酒敲門客送詩老慙生計拙役役又何為懷友柴門春事盡未老故人來樹密鳥相語山空花自開傾心多日别屈指幾時回為問頻書札何時共酒杯夏夜小酌小酌酬清興憑闌看月移分茶醒醉客添燭了殘碁螢影明桐井蛙聲出草池荒城江漏逺試問夜何其王修竹約觀打魚分韻得圓字隔岸呼漁伴輕篙破晚烟鳴榔舟葉聚撒網浪花圓饞鷺窺髙樹驚鱗過别川洋洋聊付物生意自無邊新雁來賔何太早嘹嚦過南樓數㸃乍離塞一聲初報秋行行驚客恨字字寫鄉愁仗節人何在帛書能寄不病中讀易窗間久多時不㸃硃研乾蟾渴水篋破蠧侵書氣味如僧淡形容似鶴癯交逰空滿眼誰念病相如月山書館山色青邊屋幽深稱隱居瓶梅香筆硯窗雪冷琴書壁有先賢像門無俗客車代耕惟舌在何必耦長沮秋夜獨坐黃庭重讀罷掩卷對寒檠髮為憂時白心因學道清一窗秋月色四壁夜蛩聲坐倦閒欹枕詩成夢不成九日書懷客鬢同秋老鄉心逐雁飛重陽今日是三徑幾時歸籬下多黃菊門前少白衣無人慰岑寂獨立對斜暉古松夭嬌生寒翠髯蛟勢倚天喬隂無六月老氣已千年斸藥人能夀巢枝鳥亦仙秋風響柯葉倣佛奏虞絃聽雪撲簌敲窗紙寒齊剡水濵六花初落夜孤枕未眠人耳靜聲逾細心清趣自真愛梅情更苦恐壓一枝春石窗為明上人賦何年鑿山骨八面鎖蒼苔海月照還白天風吹不開玲瓏宜丈室明潔稱登臺眼界皆通透閒雲任去來對鏡勳業夢不到曉窗時一看是非須內照妍醜付旁觀客鬢從渠白詩肩本自寒儼然瞻視處賴爾整衣冠夜坐世事等輕雲蘧廬寄此身青燈少年夢白髮異鄉人按劍驚山鬼吞丹養谷神黃庭重讀罷吾得葆吾真西州即事一雨洗空碧江城獨倚樓山吞殘日沒水挾斷雲流燈影深村夜鐘聲古寺秋西州舊逰地十載此淹留春日即事扶杖行幽徑園林欲暮天錦棠紅濯雨絲柳緑繅煙春事忽三月風光又一年客懷正愁絶那復聽啼鵑採菊籬東閒採菊三徑碧苔深曉露冷雙屐秋風香一襟餐英供小酌嗅蕊伴清吟㑹得悠然處方知靖節心春日春色濃於酒何須醉玉觴柳疏鶯占影花雜蝶分香往事隨流水閒愁付夕陽吟邊自歌舞猶學少年狂石門羸馬東山路駸駸抵石門落花春夜雨流水暮煙村久客悲行役清愁攪夢魂勞生多感慨餘恨付乾坤書山隂驛迢遞三山道重來感舊逰潮聲寒帶雨山色淡生秋寄驛通鄉信題詩記旅愁江湖十年客兩度到西州江樓憑髙閒眺望老眼倍增明林白山雲出潮紅海日生登臨懷舊恨吟笑遣閒情客裏逢心友開樽叙昔盟竹杖一枝蒼節瘦恰稱地行仙不但挑詩卷尤堪掛酒錢看梅敲雪落引鶴卓苔穿莫近葛陂水化龍蜚上天次韻書懷風霜頭已白悔不早歸耕客路逺千里儒冠誤一生世情雲共薄心事月同明老去便疏散逢人懶送迎贈皎上人破衲和雲著何時下赤城髙年頭未白得道骨全清詩思秋空濶禪心夜月明何當捐世事來結逺公盟王直翁相過芒鞋朝踏雨來自赤城山久别翻生面相看各老顔開樽茅屋裡煮茗竹林間此去須榮遇寧愁行路難鴛鴦梅孤花忽嫵媚並蒂占春陽自有雙成意全勝姑射妝月溪同浴影雪樹共棲香玉笛頻吹處交飛落野塘王琴所話别羈懷不可述賴有古琴知客舍相逢日江楓正落時夕陽村店酒秋色野橋詩别去吳江上悠悠動逺思除夜即事除夕無詩侣燈窗酒獨斟三更風雪夜一片嵗寒心衰老常憂病清閒不廢吟明朝年八十晚景惜榆隂王可交升仙臺四首臺在青龍鎮南人去臺猶在飛升事可嘉神仙多變幻塵世總虛花煉氣顔雖老勞心鬢已華千年留古跡題詠屬詩家異人鍾秀氣草木亦精神見說為漁父誰知悟道真仙家多勝景世路有迷津安得騎黃鶴相隨入昊旻仙翁不可見惟有一空亭地冷春留雪林深晝見星松篁團秀色蘭蕙吐幽馨立盡斜陽影閒看鶴刷翎我來閒弔古觸景覺凄凉踏石雲侵履捫蘿露濕裳森森林木茂馥馥野花香寺近尋僧話談禪坐竹床冬夜即事獨寢書窗下其如寒夜何頭邊枕黃妳腳底踏湯婆紙帳梅花暖布衾春意多道人無妄想夢不到南柯寄友人相望咫尺地久不到蝸廬室邇人何處心親迹甚疏交游常念舊情意只如初我欲攜囊去相逢勝寄書偶書老來驚歲晚愁裡度年華雲凍天將雪山寒樹未花曉窗留客飯午寺覔僧茶歸路江村暝行行及暮鴉孤雁長空獨嘹唳隱約背斜暉塞北離羣逺江南失侣歸度雲憐隻影照水認雙飛却羡投林鳥相呼入翠微呈曾蒲澗提刑乃荼山後人茶山曾以活字詩授陸放翁詩自茶山後如公世所稀特來參活字應肯授𤣥機寒澗孤芳老秋雲獨鶴飛台山千萬丈望望未能歸和茅亦山韻二首一生場屋夢老去付悠悠始信功名事難將智力謀有才如孔孟無命不伊周吾道今如此蒼天可問不愛靜吟成僻耽書近欲癡事多因錯省節不為貧移長物新添畫生涯舊有詩窮通係天命知命復何疑題嚴子陵故人雖即位自不願為官天下事已定山中人可閒一絲江月色千古客星寒捷徑終南士聞風定赧然除夕爆竹驚殘臘冬春此夕分且斟分歲酒懶賦送窮文客思愁簷雨鄉心逐海雲陽和在何處明日問東君和鄭梅深有錢塘十詠江湖新識面恰似舊相知腹貯三餘學才工十詠詩聲名蘇太史家世鄭當時客路攜琴去終須遇子期即事雀羅門户靜無客扣柴扄索句髭先白看書眼尚青雲粘題石壁月浸汲泉瓶笑殺利名客沈酣死不醒對客窗下篝鐙坐相看白髮新共談為客事同是異鄉人詩寫梅花月茶煎穀雨春明朝愁逺别離思欲沾巾寒夜呈梅深空齊對孤客寂寞似僧家爐冷頻燒葉燈昏不吐花夜長添睡思嵗晚憶年華吟倦推窗坐梅簷月未斜林霽山架閣同宿山中秋風山館客移席近汀前共語忽深夜相看非少年斗垂天末樹鱗出雨餘天亦有茆簷下飯牛人未眠逰東庵庵連兜率寺三徑竹邊開林密暑不到窗虛月自來暮山啼鳥靜雲樹嘯猿哀拂拭殘碑字年深半緑苔贈了上人抄化破衲卷秋雲入山深更深近聞營梵剎應不纍禪心寒瀑瀉蒼壁晚花生古林遙思明月夜誰聽頴師琴呈毛一齊先生前輩雕零盡如公尚典刑為僧眉獨白見客眼長青教子成三俊傳家有六經我來問竒字應許扣柴扄别徐敬菊契濶又兩載光隂一擲梭秖因離别久不覺語言多安得長留此其如欲去何詩盟終未冷早晚更相過寄姜仕可獨學苦無友年來愧廣文懷賢歌伐木憶别賦停雲病後少出戶夢中多見君盍簮須有日却與共論文歲晚書懷呈月山太守光隂催我去衰病亦堪憐殘臘不多日餘生能幾年有為俱是妄無事即成仙近得安心法蒲團學坐禪鶴林仙壇寺古壇歸鶴杳野鹿自成羣嵐氣浮清曉鐘聲出白雲樹穿僧屋老水到寺門分人世無窮事山中了不聞枕易越中詩社試題都魁古鼎煙銷倦㸃朱翛然髙卧夜寒初四簷寂寂半床夢兩鬢蕭蕭一卷書日月冥心知代謝隂陽回首驗盈虛起來萬象皆吾有收拾乾坤在草廬考官李侍郎應祈批詩題莫難於枕易自非作家大手筆詎能模寫蓋以其不涉風雲雨露江山花鳥此其所以為難也豫閲三十餘卷鮮有全篇純粹正如披沙揀金使人悶悶忽見此作若紛紛盆盎中得古罍洗把玩不忍釋手此詩起句倦字便含睡意頷聨氣象優游殊不費力曲盡枕易之妙頸聨冥心回首四字極其精到結句如萬馬橫奔勢不可遏且有力量全篇體製合法度音調諧宫商三復降歎此必騷壇老手望見旗鼓已知其為大將也冠冕衆作誰曰不然棋聲何處仙翁愛手談時聞剝啄竹林間一枰子玉敲雲響幾度午窗驚夢殘緩著應知心路逺急圍不放耳根閒爛柯人去收殘局寂寂空亭石几寒題李藍溪梅花吟卷孤芳不與衆芳同肯媚東君事冶容寒苦一生蘇武雪清髙千古伯夷風瓊瑶照樹偏宜晚鐵石盤根却耐冬幾度看花立霜曉斷腸都在角聲中秋夜博山香冷夜將闌紅影搖窗燭未殘庭樹露濃花氣濕井梧風老葉聲乾世情冷暖知心少朋舊東西㑹面難一段客愁吟不就無言背月倚闌干秋夜和月山韻任月山主人也寒夜殘燈照客愁衾單添盡鷫鸘裘半窗明月三更夢一枕西風兩鬢秋吟骨棱棱寬帶眼歸心切切望刀頭何如束篋家山去獨駕柴車訪伯休蘭亭㑹飲觀晉帖秖說清談晉業虛禊亭此樂後來無一時人物已陳迹千古山林空畫圖鐘帶夕陽來逺寺碑和春雨卧平蕪昭陵玉匣猶難保筆意從誰認鼠鬚春游次王修竹監簿韻天色新晴帶薄寒主人領客出城關蘭亭觴詠尋羲帖窆石衣冠弔禹山春水斷橋芳草碧曉風啼鳥落花閒囊中詩句壺中酒何必仙人大小還修竹宴客東園二月韶光潑眼濃攜樽宴客小亭東酒當半醉半醒處春在輕寒輕暖中拂檻柳添吟鬢緑壓闌花妬舞衣紅晚來聽唱梁州曲聲繞吳姬扇底風送張伯威提舉人生聚散等浮漚憶昔過從與勝逰棋局敲殘清夜月菊花吟老半窗秋客中送客難為别山外看山總是愁回首片帆江路逺疏煙斜雨到西州春日即事園林芳事漸闌珊客思無聊午夢殘紅杏花繁蜂蜜飽碧芹香老燕泥乾光隂有限髮已白勳業無成心尚丹倚遍吟闌天欲暮一簾風雨捲春寒小酌小酌園林酒半醺落紅影裡惜餘春插花歸去蜂隨帽傍柳行來鶯避人白髮尚為千里客黃金難鑄百年身何時歸賦滄浪水浣我征衣萬斛塵城南即事支笻破曉出南城古寺凄迷草自生幾處亭臺空鎖鑰百年人物盡丘塋雕梁語燕應無主廢圃殘花自有情世事轉頭皆夢境浮生何用苦營營夜坐次林梅山韻人倚幽窗夜未闌竹爐灰冷篆煙殘一天露氣星辰濕萬壑風聲草木寒老去客懷多感慨年來世事轉艱難何時歸隱孤山下明月梅花約共看有感自嘆文章不遇時平生壯志與心違十年湖海無家住千里鄉關有夢歸殘夜月寒燈暈淡髙秋天濶雁聲微傷今思古愁無奈老淚斑斑濕客衣生朝自述都道人生七十稀老逢初度嘆衰遲飛觴醉月貧無酒走筆吟春富有詩憔悴自憐蒲柳質劬勞空起蓼莪思門無賀客清如水獨對蘭花課楚辭雪片片隨風整復斜飄來老鬢覺添華江山不夜月千里天地無私玉萬家逺岸未春飛柳絮前村破曉壓梅花羔羊金帳應粗俗自掬氷泉煮石茶九日客懷烏帽斜欹白髮侵老來空憶舊登臨一枝黃菊西風淚數畝蒼苔故國心梧顫秋聲庭露冷雁傳寒信塞雲深不須貰酒酬佳節只把陶詩細細吟舟次摴蒱廟短棹衝寒過浦東扁舟一葉載詩翁斷煙流水殘雲外古木荒祠夕照中吟罷小樓何處笛酒醒孤枕半江風潮生潮落朝還暮堪歎人生自轉蓬月夜登樓玉宇澄清暮靄收吟邊怕倚仲宣樓寒蟾千里夜如晝新雁