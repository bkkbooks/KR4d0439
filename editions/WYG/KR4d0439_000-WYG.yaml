body:
  text: 屏巖小稿别集類四元提要臣等謹案屏巖小稿一巻元張觀光撰觀光字直夫東陽人其始末未詳集中有和仇山村九日吟巻詩而晚春即事詩中有杜鵑亡國恨歸鶴故鄉情葢宋末元初人又有甲子嵗旦詩考景定五年為甲子元泰定元年亦為甲子詩中有嵗換上元新甲子句以厯家三元之次推之上元甲子當屬泰定觀其除夕即事詩中稱明朝年八十則得夀頗長其時猶相及也詩多窮途之感葢不遇之士惟贈談命姚月壺詩有試把五行推測看廣文官冷幾時春句其殆曽為學官者歟全集皆格意清淺頗窘于邊幅然吐屬婉秀無鉤章棘句之態越中詩社以枕易為題李應祈次其甲乙以觀光為第一其詩今見集中併載應祈批稱其若紛紛盆盎中得古罍洗又有梅魂七言律詩一首注曰武林試中秋色五言律詩一首註曰山陰詩社中選葢在當日亦以吟咏擅名矣乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2b806e0b092e9e4e6554059742863c8cbf466a6a361b3235d8b9c9f5f20c5dc6
